<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncertainty Multiplication/Division Calculator</title>
  <style>
    .calc-inputs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .widget-input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .widget-input-group label {
      font-size: 0.9rem;
      font-weight: 700;
      color: #475569;
    }
    .uncertainty-input-pair {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .uncertainty-input-pair input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 1.1rem;
      text-align: center;
      outline: none;
      background: #f8fafc;
    }
    .uncertainty-input-pair input:focus {
      border-color: #0d9488;
      background: #ffffff;
    }
    .uncertainty-input-pair span {
      font-weight: 700;
      color: #64748b;
      font-size: 1.1rem;
    }
    .calc-btn-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .calc-btn-row label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    #mul-op {
      flex: 1;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      font-size: 1.05rem;
      font-weight: 600;
      outline: none;
      background: #ffffff;
      color: #0f172a;
    }
  </style>
    <!-- Shared simulation resources -->
  <link rel="stylesheet" href="../../../template/sim-base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" integrity="sha384-vlBdW0r3AcZO/HboRPznQNowvexd3fY8qHOWkBi5q7KGgqJ+F48+DceybYmrVbmB" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js" integrity="sha384-AtrdNsnxl/75rvBneBVH7DtOvCxSVahR2zWqle1coBKd8DEmLoviqNeJSx64gNAs" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js" integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz" crossorigin="anonymous" onload="autoRenderMath()"></script>
  <script src="../../../template/sim-graph.js"></script>
  
</head>
<body>

  <div class="calc-inputs-grid">
    <div class="widget-input-group">
      <label>ปริมาณ A (ค่าจริง ± คลาดเคลื่อน)</label>
      <div class="uncertainty-input-pair">
        <input type="number" id="mul-val-a" value="5.0" step="0.1">
        <span>±</span>
        <input type="number" id="mul-err-a" value="0.1" step="0.1">
      </div>
    </div>

    <div class="widget-input-group">
      <label>ปริมาณ B (ค่าจริง ± คลาดเคลื่อน)</label>
      <div class="uncertainty-input-pair">
        <input type="number" id="mul-val-b" value="10.0" step="0.1">
        <span>±</span>
        <input type="number" id="mul-err-b" value="0.2" step="0.1">
      </div>
    </div>
  </div>

  <div class="calc-btn-row">
    <label>
      เลือกการดำเนินการ:
      <select id="mul-op">
        <option value="mul">คูณ (A × B)</option>
        <option value="div">หาร (A ÷ B)</option>
      </select>
    </label>
  </div>

  <div class="calc-result-box">
    <div class="result-formula">ผลลัพธ์การคำนวณ (ค่าจริง และเปอร์เซ็นต์คลาดเคลื่อนสะสม)</div>
    <div class="result-value" id="mul-result-val">50.0 (คลาดเคลื่อน ± 4.0%)</div>
  </div>

  <div class="calc-steps" id="mul-steps">
    <!-- Steps populated dynamically -->
  </div>

  <script>
    const mulValA = document.getElementById('mul-val-a');
    const mulErrA = document.getElementById('mul-err-a');
    const mulValB = document.getElementById('mul-val-b');
    const mulErrB = document.getElementById('mul-err-b');
    const mulOpSelect = document.getElementById('mul-op');

    const mulResultVal = document.getElementById('mul-result-val');
    const mulSteps = document.getElementById('mul-steps');

    [mulValA, mulErrA, mulValB, mulErrB, mulOpSelect].forEach(element => {
      if (element) {
        element.addEventListener('input', calculateMulDivUncertainty);
      }
    });

    function calculateMulDivUncertainty() {
      if (!mulValA || !mulErrA || !mulValB || !mulErrB || !mulResultVal || !mulSteps) return;

      const A = parseFloat(mulValA.value);
      const dA = parseFloat(mulErrA.value);
      const B = parseFloat(mulValB.value);
      const dB = parseFloat(mulErrB.value);
      const op = mulOpSelect.value;

      if (isNaN(A) || isNaN(dA) || isNaN(B) || isNaN(dB) || A === 0 || B === 0) {
        mulResultVal.textContent = 'กรอกข้อมูลไม่ครบถ้วน / ห้ามเป็น 0';
        mulSteps.textContent = 'รอการคำนวณ...';
        return;
      }

      const valResult = op === 'mul' ? (A * B) : (A / B);
      
      const pctA = (dA / A) * 100;
      const pctB = (dB / B) * 100;
      const pctResult = pctA + pctB; // Percentage uncertainties add!

      const countSigFigs = (str) => {
        let coef = str.trim();
        const sciMatch = coef.match(/^([^-eExX\*]+)/);
        if (sciMatch) coef = sciMatch[1].trim();

        let cleaned = coef.replace(/[-.]/g, '');
        cleaned = cleaned.replace(/^0+/, '');
        if (cleaned.length === 0) return 0;
        return cleaned.length;
      };

      const sfA = countSigFigs(mulValA.value);
      const sfB = countSigFigs(mulValB.value);
      const targetSf = Math.max(1, Math.min(sfA, sfB));

      let formattedVal = valResult.toPrecision(targetSf);

      mulResultVal.textContent = `${formattedVal} (คลาดเคลื่อน ± ${pctResult.toFixed(1)}%)`;

      const opSign = op === 'mul' ? '×' : '÷';
      mulSteps.innerHTML = `
        <div>1. คำนวณค่าจริง: ${A} ${opSign} ${B} = ${valResult.toFixed(4)} → ปรับเลขนัยสำคัญมี ${targetSf} ตัว (เท่ากับตัวตั้งที่น้อยที่สุด) → <strong>${formattedVal}</strong></div>
        <div>2. หา % คลาดเคลื่อนของ A: (${dA} / ${A}) × 100% = <strong>${pctA.toFixed(1)}%</strong></div>
        <div>3. หา % คลาดเคลื่อนของ B: (${dB} / ${B}) × 100% = <strong>${pctB.toFixed(1)}%</strong></div>
        <div>4. % คลาดเคลื่อนคำตอบ: ${pctA.toFixed(1)}% + ${pctB.toFixed(1)}% = <strong>${pctResult.toFixed(1)}%</strong> (เปอร์เซ็นต์คลาดเคลื่อนบวกกันเสมอ)</div>
        <div>5. คำตอบสัญกรณ์: <strong>${formattedVal} (คลาดเคลื่อน ± ${pctResult.toFixed(1)}%)</strong></div>
      `;
    }

    calculateMulDivUncertainty();
  </script>
</body>
</html>
