<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คลังเรียนรู้วิทยาศาสตร์และคณิตศาสตร์เสมือนจริง | Science & Math Interactive Lab</title>
  <meta name="description" content="คลังปฏิบัติการและสื่อการสอนวิชาวิทยาศาสตร์และคณิตศาสตร์ แบบปฏิสัมพันธ์ เรียนรู้ทฤษฎีควบคู่การจำลองเสมือนจริง">
  <link rel="stylesheet" href="style.css">
  <!-- Import dynamic configuration -->
  <script src="lessons_config.js"></script>
</head>
<body>

  <!-- Background Grid & Shapes Decor -->
  <div class="bg-grid"></div>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
  </div>

  <div class="container">
    
    <header style="text-align: center; margin-bottom: 24px; z-index: 10;">
      <h1 style="font-family: var(--font-title); font-size: 2.2rem; font-weight: 800; color: var(--text-primary); margin-bottom: 8px;">
        คลังเรียนรู้และสื่อจำลองเสมือนจริง
      </h1>
      <p style="font-family: var(--font-body); font-size: 1.05rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto;">
        สื่อการสอนและห้องปฏิบัติการปฏิสัมพันธ์ (Interactive Learning Lab) สำหรับการสอนในชั้นเรียน
      </p>
    </header>
    
    <!-- Interactive Modules Selection Grid (populated dynamically) -->
    <main class="modules-grid" id="modules-grid">
      <!-- Injected by JavaScript -->
    </main>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('modules-grid');
      grid.innerHTML = '';

      if (typeof LESSONS_CONFIG !== 'undefined') {
        LESSONS_CONFIG.forEach(lesson => {
          if (lesson.status !== 'available') return;

          const card = document.createElement('article');
          card.className = `module-card ${lesson.accent}`;
          card.setAttribute('aria-label', `บทเรียน${lesson.title}`);
          card.style.cursor = 'pointer';
          
          card.innerHTML = `
            <div class="card-header">
              <div class="badge-row">
                <span class="badge">${lesson.type}</span>
                <span class="badge">${lesson.grade}</span>
              </div>
            </div>
            
            <div class="card-info">
              <h2 class="card-title">${lesson.title}</h2>
              <p class="card-desc">${lesson.description}</p>
            </div>

            <div class="card-footer">
              <button class="action-btn" aria-label="เข้าสู่บทเรียน${lesson.title}">
                เข้าสู่บทเรียน ➔
              </button>
            </div>
          `;

          // Handle click to go to lesson URL
          card.addEventListener('click', () => {
            window.location.href = lesson.url;
          });

          grid.appendChild(card);
        });
      } else {
        grid.innerHTML = '<p style="grid-column: span 2; text-align: center; color: var(--text-muted);">ไม่พบข้อมูลบทเรียน</p>';
      }
    });
  </script>
</body>
</html>
