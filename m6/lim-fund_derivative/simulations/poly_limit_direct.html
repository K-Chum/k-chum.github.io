<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Substitution Polynomial Limit</title>
  <style>
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
    }
    select {
      width: 100%;
      padding: 14px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      font-family: 'Inter', 'Noto Sans Thai', sans-serif;
      font-size: 1.15rem;
      background: #ffffff;
      color: #0f172a;
      outline: none;
    }
    select:focus {
      border-color: #8b5cf6;
    }
    .c-btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .c-btn {
      flex: 1;
      min-width: 44px;
      background: #e0e7ff;
      color: #4f46e5;
      border: 1px solid #c7d2fe;
      padding: 12px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .c-btn:hover {
      background: #c7d2fe;
    }
    .c-btn.active {
      background: #8b5cf6;
      border-color: #8b5cf6;
      color: #ffffff;
    }
    .display-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: center;
      height: 100%;
    }
    /* KaTeX display in notation box */
    .notation-box {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #334155;
      padding: 8px 0;
    }
    .calculation-box {
      background: #f5f3ff;
      border: 1.5px solid #ddd6fe;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .subst-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #5b21b6;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .calc-steps-box {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1e1b4b;
      margin-top: 6px;
    }
  </style>
    <!-- Shared simulation resources -->
  <link rel="stylesheet" href="../../../template/sim-base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" integrity="sha384-vlBdW0r3AcZO/HboRPznQNowvexd3fY8qHOWkBi5q7KGgqJ+F48+DceybYmrVbmB" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js" integrity="sha384-AtrdNsnxl/75rvBneBVH7DtOvCxSVahR2zWqle1coBKd8DEmLoviqNeJSx64gNAs" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js" integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz" crossorigin="anonymous" onload="autoRenderMath()"></script>
  <script src="../../../template/sim-graph.js"></script>
  
</head>
<body>

  <div class="container">
    
    <!-- LEFT: Inputs -->
    <div class="card">
      <div class="card-title">1. เลือกฟังก์ชันพหุนาม P(x)</div>
      <select id="poly-func-select">
        <option value="1">P(x) = x² + 2x − 3</option>
        <option value="2">P(x) = 2x³ − 5x + 4</option>
        <option value="3">P(x) = −3x² + 4x + 6</option>
      </select>
      
      <div class="card-title" style="margin-top: 6px;">2. เลือกค่าของ x เข้าใกล้จุด c</div>
      <div class="c-btn-group" id="poly-c-buttons">
        <button class="c-btn" data-c="-2">-2</button>
        <button class="c-btn" data-c="-1">-1</button>
        <button class="c-btn" data-c="0">0</button>
        <button class="c-btn active" data-c="1">1</button>
        <button class="c-btn" data-c="2">2</button>
        <button class="c-btn" data-c="3">3</button>
      </div>
    </div>

    <!-- RIGHT: Results and calculations -->
    <div class="display-panel">
      <div class="notation-box" id="poly-limit-notation"></div>
      
      <div class="calculation-box">
        <div class="subst-label">แทนค่าตรง x = <span id="poly-c-display">1</span></div>
        <div class="calc-steps-box" id="poly-substitution"></div>
        <div class="calc-result-box" id="poly-result"></div>
      </div>
    </div>

  </div>

  <script>
    function kt(latex, display = false) {
      try { return katex.renderToString(latex, { throwOnError: false, displayMode: display }); }
      catch(e) { return latex; }
    }

    let katexReady = false;
    function autoRenderMath() {
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(document.body, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true }
          ],
          throwOnError: false
        });
      }
      katexReady = true;
      updatePolynomialLimit();
    }

    const polyFuncSelect = document.getElementById('poly-func-select');
    const polyCButtons = document.querySelectorAll('#poly-c-buttons button');
    const polyLimitNotation = document.getElementById('poly-limit-notation');
    const polyCDisplay = document.getElementById('poly-c-display');
    const polySubstitution = document.getElementById('poly-substitution');
    const polyResult = document.getElementById('poly-result');
    
    let selectedC = 1;

    polyFuncSelect.addEventListener('change', updatePolynomialLimit);
    
    polyCButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        polyCButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedC = parseInt(btn.getAttribute('data-c'));
        updatePolynomialLimit();
      });
    });

    function updatePolynomialLimit() {
      if (!katexReady) return;
      const funcType = polyFuncSelect.value;
      const c = selectedC;
      polyCDisplay.textContent = c;
      
      const fmtC = c < 0 ? `(${c})` : `${c}`;
      let notationLatex = '', substLatex = '', resultValue = 0;

      if (funcType === '1') {
        notationLatex = `\\lim_{x \\to ${c}} (x^2 + 2x - 3)`;
        substLatex    = `= (${fmtC})^2 + 2(${fmtC}) - 3`;
        resultValue   = c * c + 2 * c - 3;
      } else if (funcType === '2') {
        notationLatex = `\\lim_{x \\to ${c}} (2x^3 - 5x + 4)`;
        substLatex    = `= 2(${fmtC})^3 - 5(${fmtC}) + 4`;
        resultValue   = 2 * (c ** 3) - 5 * c + 4;
      } else if (funcType === '3') {
        notationLatex = `\\lim_{x \\to ${c}} (-3x^2 + 4x + 6)`;
        substLatex    = `= -3(${fmtC})^2 + 4(${fmtC}) + 6`;
        resultValue   = -3 * (c * c) + 4 * c + 6;
      }

      polyLimitNotation.innerHTML = kt(notationLatex, true);
      polySubstitution.innerHTML  = kt(substLatex);
      polyResult.innerHTML        = kt(`= ${resultValue}`);
    }

    updatePolynomialLimit();
  </script>
</body>
</html>
